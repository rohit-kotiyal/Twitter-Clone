{% extends 'base.html' %}

{% block title %}
    Comment
{% endblock %}

{% block content %}
    <div>
        <h2>{{tweet.author.username}}</h2>
        <p>{{tweet.content}}</p>
    </div>

    <form action="" method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Post Comment</button>
    </form>

    <div>
        <div>
            {% for comment in comments %}
                {% include 'tweets/comment_thread.html' %}
            {% empty %}
                <p>No comments yet.</p>
            {% endfor %}
        </div>
    </div>
{% endblock %}
