<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <form action="" method="POST">
        {% csrf_token %}
        {{form.as_p}}

        <button type="submit">Login</button>
    </form>

    <form action="{% url 'logout' %}" method="POST">
        {% csrf_token %}

        <button type="submit">Logout</button>
    </form>
</body>
</html>
